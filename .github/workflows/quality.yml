name: Quality checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Validate project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Python setup
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Validate task data
        run: python scripts/validate_tasks.py data/tasks.json
      - name: Run unit tests
        run: python -m unittest tests/test_validate_tasks.py
      - name: Check internal links
        run: python scripts/check_links.py
